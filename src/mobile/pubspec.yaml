name: myapp_mobile
description: MyApp Mobile - Multi-tier template

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Auth
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  jwt_decoder: ^2.0.1

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # SignalR
  signalr_netcore: ^1.3.4

  # UI
  cupertino_icons: ^1.0.8

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
