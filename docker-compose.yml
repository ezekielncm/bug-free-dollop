services:
  # ── ASP.NET Core API ──────────────────────────────────────────────────────
  api:
    build:
      context: ./src/api
      dockerfile: ../../docker/api/Dockerfile
    container_name: myapp-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Developpement
      - DatabaseProvider=${DB_PROVIDER:-SqlServer}
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING:-Server=db,1433;Database=MyAppDb;User Id=sa;Password=${DB_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;}
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=amqp://rabbitmq:${RABBITMQ_PASSWORD:-rabbitmq}@rabbitmq:5672/
      - Jwt__SecretKey=${JWT_SECRET_KEY:-super-secret-key-change-in-production-min-32-chars!}
      - Jwt__Issuer=MyApp
      - Jwt__Audience=MyApp
      - Jwt__ExpiryMinutes=60
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=rabbitmq
      - RabbitMQ__Password=${RABBITMQ_PASSWORD:-rabbitmq}
      - OpenTelemetry__OtlpEndpoint=http://otel-collector:4317
      - Serilog__SeqUrl=http://seq:5341
      - AllowedOrigins__0=http://localhost:3000
      - AllowedOrigins__1=http://dashboard:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - myapp-network

  # ── Next.js Dashboard ──────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: ../../docker/dashboard/Dockerfile
    container_name: myapp-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_SIGNALR_URL=http://localhost:5000
    depends_on:
      - api
    networks:
      - myapp-network

  # ── SQL Server ─────────────────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: myapp-db
    restart: unless-stopped
    environment:
      - SA_PASSWORD=${DB_PASSWORD:-YourStrong@Passw0rd}
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:-YourStrong@Passw0rd}" -Q "SELECT 1" -b -o /dev/null -C
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - myapp-network

  # ── PostgreSQL (alternative provider) ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: myapp-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=myappdb
      - POSTGRES_USER=myapp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-myapp_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d myappdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network
    profiles:
      - postgres

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myapp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes #--requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: myapp-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-rabbitmq}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - myapp-network

  # ── Seq (structured logging) ───────────────────────────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: myapp-seq
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=${SEQ_PASSWORD:-SeqAdmin123!}
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - myapp-network

  # ── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: myapp-otel
    restart: unless-stopped
    volumes:
      - ./monitoring/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics of collector
    depends_on:
      - jaeger
    networks:
      - myapp-network

  # ── Jaeger (tracing) ───────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: myapp-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "14250:14250"   # gRPC
    networks:
      - myapp-network

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: myapp-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - myapp-network

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: myapp-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - myapp-network

  # ── Hangfire Dashboard (proxied via API) ──────────────────────────────────
  # Access via http://localhost:5000/hangfire

volumes:
  sqlserver-data:
  postgres-data:
  redis-data:
  rabbitmq-data:
  seq-data:
  grafana-data:

networks:
  myapp-network:
    driver: bridge
