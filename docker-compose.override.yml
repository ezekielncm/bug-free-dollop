# Development overrides
services:
  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ./src/api:/src
    # Override to run with dotnet watch for hot reload in development
    entrypoint: ["dotnet", "watch", "run", "--project", "MyApp.API/MyApp.API.csproj", "--no-launch-profile"]

  dashboard:
    volumes:
      - ./src/dashboard:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  db:
    ports:
      - "1433:1433"

  redis:
    ports:
      - "6379:6379"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"
